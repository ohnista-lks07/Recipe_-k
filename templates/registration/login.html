{% extends "base.html" %}
{% block title %}Увійти{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h1 class="mb-4">Увійти</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Увійти</button>
        </form>
        <p class="mt-3">Немає акаунту? <a href="{% url 'register' %}">Зареєструватись</a></p>
    </div>
</div>
{% endblock %}
