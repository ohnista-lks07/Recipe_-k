<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Recipe Book{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: #ccc; }
        .navbar { background: #111 !important; border-bottom: 1px solid #2a2a2a; }
        .navbar-brand { color: #4ade80 !important; font-size: 20px; }
        .nav-link { color: #aaa !important; }
        .nav-link:hover { color: #4ade80 !important; }
        .btn-green { background: #4ade80; color: #111; border: none; font-weight: 500; }
        .btn-green:hover { background: #22c55e; color: #111; }
        .btn-outline-green { border: 1px solid #4ade80; color: #4ade80; background: transparent; }
        .btn-outline-green:hover { background: #4ade80; color: #111; }
        .card { background: #222; border: 1px solid #2a2a2a; border-radius: 12px; }
        .card-img-top { height: 200px; object-fit: cover; }
        .badge-category { background: #1a2e1a; color: #4ade80; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
        .card-title { color: #fff; }
        .card-text { color: #888; }
        .page-title { color: #fff; font-size: 24px; font-weight: 500; }
        .section-label { color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control, .form-select { background: #2a2a2a; border: 1px solid #333; color: #ccc; }
        .form-control:focus, .form-select:focus { background: #2a2a2a; border-color: #4ade80; color: #ccc; box-shadow: 0 0 0 2px rgba(74,222,128,0.2); }
        .form-label { color: #aaa; }
        .alert-success { background: #1a2e1a; border-color: #4ade80; color: #4ade80; }
        .nav-tabs { border-bottom: 1px solid #2a2a2a; }
        .nav-tabs .nav-link { color: #888; border: none; border-bottom: 2px solid transparent; }
        .nav-tabs .nav-link.active { color: #4ade80; border-bottom-color: #4ade80; background: transparent; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🍳 Recipe Book</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3 align-items-center">
            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'home' %}">Всі рецепти</a>
                <a class="nav-link" href="{% url 'dashboard' %}">Мої рецепти</a>
                <a class="btn btn-green px-3 py-1" href="{% url 'recipe_create' %}">+ Додати</a>
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="nav-link btn btn-link" style="color:#666;">Вийти ({{ user.username }})</button>
                </form>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Увійти</a>
                <a class="btn btn-green px-3 py-1" href="{% url 'register' %}">Реєстрація</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
