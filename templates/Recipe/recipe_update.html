{% extends "base.html" %}
{% block title %}Редагувати рецепт{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h1 class="page-title mb-4" style="font-size:24px;">Редагувати рецепт</h1>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Назва</label>
                    {{ form.title }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Категорія</label>
                    {{ form.category }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Спосіб приготування</label>
                    {{ form.text_content }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Фото</label>
                    {% if form.instance.image %}
                        <div style="margin-bottom:8px;">
                            <img src="{{ form.instance.image.url }}" style="height:80px; border-radius:8px; object-fit:cover;">
                        </div>
                    {% endif %}
                    {{ form.image }}
                </div>
                <div class="mb-4 d-flex align-items-center gap-2">
                    {{ form.is_public }}
                    <label class="form-label mb-0">Публічний рецепт</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-green">Зберегти зміни</button>
                    <a href="{% url 'home' %}" class="btn btn-outline-green">Скасувати</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
